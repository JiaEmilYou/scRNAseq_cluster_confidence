scanpy:
  input_path:
  dataset_name: paul15
  n_top_genes: 2000
  n_pcs: 50
  n_neighbors: 15
  leiden_resolution: 2.5

lightgbm:
  feature_key: X_pca
  label_key: leiden
  test_size: 0.2
  random_state: 42
  n_estimators: 100
  learning_rate: 0.1
  cv_folds: 5
  cv_repeats: 3

evaluation:
  low_confidence_threshold: 0.6

visualization:
  color_keys:
  - leiden
  - predicted_cluster_lgbm
  - confidence_lgbm
  - prediction_matches_leiden
paths:
  processed: data/processed/processed.h5ad
  annotated: data/processed/annotated.h5ad
  model: artifacts/models/lightgbm_model.txt
  metrics: artifacts/metrics/metrics.json
  figures: artifacts/figures
